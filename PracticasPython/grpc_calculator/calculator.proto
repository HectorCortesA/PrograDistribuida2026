syntax = "proto3";

package calculator;

// Request: solo la cadena de texto
message ExpressionRequest {
  string expression = 1;              // "2+3+5-2x7"
  optional string client_name = 2;   // optional: quien envía (para log)
}

// oneof: éxito o error
message ExpressionResponse {
  oneof result {
    SuccessResult success = 1;
    ErrorResult   error   = 2;
  }
}

message SuccessResult {
  double value            = 1;
  string parsed_expression = 2;  // Expresión normalizada
  repeated string steps   = 3;  // repeated: pasos de evaluación
}

message ErrorResult {
  string code    = 1;
  string message = 2;
}

service CalculatorService {
  rpc Evaluate (ExpressionRequest) returns (ExpressionResponse);
}